version: '3.8'

services:
  telewatch:
    build:
      context: .
      dockerfile: Dockerfile.alpine
    image: telewatch:alpine
    container_name: telewatch
    
    # Resource limits for lightweight operation
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    
    restart: unless-stopped
    
    # Mount config and logs
    volumes:
      - ./config:/app/config:ro
      - /var/log:/var/log:ro
      # Uncomment to persist cache/state
      # - telewatch-data:/app/data
    
    environment:
      - PYTHONUNBUFFERED=1
      # Monitor will look for these in environment or config
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # API Keys (set only the one you use)
      - LLM_API_KEY=${LLM_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}

volumes:
  telewatch-data:
